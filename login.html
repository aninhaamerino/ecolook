<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cherry</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container-login">

        <section class="caixa-login">
            <a href="index.html" class="btn-voltar-fixo" aria-label="Voltar para a página inicial">
                <i class="fa-solid fa-arrow-left"></i> Voltar
            </a>

            <img src="img/cerejaa.png" class="cereja-login" alt="logo de cereja da ecolook">
            <h1>Bem-vindo</h1>
            <p>Entre na sua conta</p>

            <form>
                <div class="campo">
                    <label>Email</label>
                    <input type="email" placeholder="Digite seu email">
                </div>

                <div class="campo">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha">
                </div>

                <button type="submit">Entrar</button>
            </form>

            <span class="criar-conta">
                Não possui conta?
                <a href="#">Criar conta</a>
            </span>
        </section>

    </main>

</body>
</html>
