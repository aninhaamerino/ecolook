<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Sacola - EcoLook</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="carrinho.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Chicle&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <header>
        <div class="header-top">
            <div class="logo-container">
                </div>
            <div class="icons">
                <a href="index.html" title="Voltar para a Home"><i class="fa-solid fa-house"></i></a>
            </div>
        </div>
    </header>

    <main class="pagina-carrinho">
        <div class="container-carrinho">
            <section class="lado-produtos">
                <h1 class="titulo-sessao">Sua Sacola</h1>
                <div id="lista-carrinho"></div>
            </section>

            <aside class="resumo">
                <h2 class="titulo-sessao">Resumo do Pedido</h2>
                <div class="detalhes-resumo">
                    <div class="linha-resumo">
                        <span>Produtos</span>
                        <span id="qtd-itens">0 itens</span>
                    </div>
                    <div class="linha-resumo total">
                        <span>Total</span>
                        <span id="total-carrinho">R$ 0,00</span>
                    </div>
                </div>
                <button class="btn-finalizar">Finalizar Compra</button>
                <a href="index.html" class="continuar-comprando">Continuar comprando</a>
            </aside>
        </div>
    </main>

    <script>
        function mostrarCarrinho() {
            let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            let lista = document.getElementById("lista-carrinho");
            let totalElemento = document.getElementById("total-carrinho");
            let qtdElemento = document.getElementById("qtd-itens");
            
            lista.innerHTML = "";
            let somaTotal = 0;

            if (carrinho.length === 0) {
                lista.innerHTML = `
                    <div class="carrinho-vazio">
                        <i class="fa-solid fa-bag-shopping"></i>
                        <p>Sua sacola está vazia.</p>
                        <a href="index.html">Ver produtos</a>
                    </div>`;
                totalElemento.innerText = "R$ 0,00";
                qtdElemento.innerText = "0 itens";
                return;
            }

            carrinho.forEach((produto, index) => {
                let precoNumerico = parseFloat(produto.preco.replace(",", "."));
                somaTotal += precoNumerico;

                lista.innerHTML += `
                    <div class="item-carrinho">
                        <div class="img-wrapper">
                            <img src="${produto.img}" alt="${produto.nome}">
                        </div>
                        <div class="info-item">
                            <div class="topo-item">
                                <h2>${produto.nome}</h2>
                                <button onclick="removerItem(${index})" class="btn-remover-icone">
                                    <i class="fa-regular fa-trash-can"></i>
                                </button>
                            </div>
                            <p class="preco-item">R$ ${produto.preco}</p>
                        </div>
                    </div>
                `;
            });

            totalElemento.innerText = `R$ ${somaTotal.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}`;
            qtdElemento.innerText = `${carrinho.length} ${carrinho.length === 1 ? 'item' : 'itens'}`;
        }

        function removerItem(index) {
            let carrinho = JSON.parse(localStorage.getItem("carrinho")) || [];
            carrinho.splice(index, 1);
            localStorage.setItem("carrinho", JSON.stringify(carrinho));
            mostrarCarrinho();
        }

        mostrarCarrinho();
    </script>
</body>
</html>
